<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog broni</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=2">
</head>

<body>

<header class="site-header">
  <div class="site-header-inner">
    <div class="site-header-title">
      <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h4l3-9 4 18 3-9h6"/></svg>
      <div>
        <h1>Katalog broni</h1>
        <p class="site-subtitle">Encyklopedia pistoletów, rewolwerów i karabinów</p>
      </div>
    </div>
  </div>
</header>

<main class="content-wrapper">

  <div class="toolbar">
    <div class="tabs-container">
      <button class="tab-btn active" data-category="pistolety" onclick="renderCategory('pistolety')">Pistolety i rewolwery</button>
      <button class="tab-btn" data-category="pm" onclick="renderCategory('pm')">Pistolety maszynowe</button>
      <button class="tab-btn" data-category="karabiny" onclick="renderCategory('karabiny')">Karabiny</button>
    </div>

    <div class="toolbar-right">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="search-input" placeholder="Szukaj modelu…" autocomplete="off">
      </div>
      <div class="view-toggle">
        <button id="btn-view-table" class="view-btn active" title="Widok tabeli" onclick="toggleView('table')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
        </button>
        <button id="btn-view-grid" class="view-btn" title="Widok kart" onclick="toggleView('grid')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div id="table-container"></div>

</main>

<div id="details"></div>

<div id="preview">
<img id="preview-img" alt="">
</div>

<script src="data.js?v=1"></script>
<script src="script.js?v=3"></script>

</body>
</html>
